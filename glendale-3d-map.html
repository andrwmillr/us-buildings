<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Glendale Building Heights — 3D</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/deck.gl@latest/dist.min.js"></script>
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
    #container { width: 100vw; height: 100vh; position: relative; }
    #legend {
      position: absolute; bottom: 30px; right: 20px; background: rgba(0,0,0,0.8);
      padding: 12px 16px; border-radius: 8px; color: white; font-size: 13px; z-index: 1;
    }
    #legend h3 { margin: 0 0 8px 0; font-size: 14px; }
    .legend-bar {
      width: 20px; height: 120px; border-radius: 3px;
      background: linear-gradient(to top, #1a0533, #4a0c6b, #a62098, #e85362, #fcae12, #fcffa4);
      display: inline-block; vertical-align: top;
    }
    .legend-labels {
      display: inline-block; vertical-align: top; margin-left: 8px;
      height: 120px; position: relative;
    }
    .legend-labels span {
      position: absolute; font-size: 11px;
    }
    #tooltip {
      position: absolute; padding: 6px 10px; background: rgba(0,0,0,0.85);
      color: white; font-size: 12px; border-radius: 4px; pointer-events: none;
      display: none; z-index: 2;
    }
  </style>
</head>
<body>
  <div id="container"></div>
  <div id="legend">
    <h3>Height (m)</h3>
    <div class="legend-bar"></div>
    <div class="legend-labels">
      <span style="top: 0">15+</span>
      <span style="top: 36px">10</span>
      <span style="top: 72px">5</span>
      <span style="top: 108px">0</span>
    </div>
  </div>
  <div id="tooltip"></div>
  <script>
    const MAX_HEIGHT = 15;

    function heightToColor(h) {
      const stops = [
        [0, [26, 5, 51]],
        [0.2, [74, 12, 107]],
        [0.4, [166, 32, 152]],
        [0.6, [232, 83, 98]],
        [0.8, [252, 174, 18]],
        [1.0, [252, 255, 164]]
      ];
      const t = Math.min(h / MAX_HEIGHT, 1);
      for (let i = 0; i < stops.length - 1; i++) {
        if (t >= stops[i][0] && t <= stops[i + 1][0]) {
          const f = (t - stops[i][0]) / (stops[i + 1][0] - stops[i][0]);
          return stops[i][1].map((c, j) => Math.round(c + f * (stops[i + 1][1][j] - c)));
        }
      }
      return stops[stops.length - 1][1];
    }

    const tooltip = document.getElementById('tooltip');

    const INITIAL_VIEW = {
      longitude: -112.15,
      latitude: 33.65,
      zoom: 12.5,
      pitch: 55,
      bearing: -20
    };

    const map = new maplibregl.Map({
      container: 'container',
      style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
      center: [INITIAL_VIEW.longitude, INITIAL_VIEW.latitude],
      zoom: INITIAL_VIEW.zoom,
      pitch: INITIAL_VIEW.pitch,
      bearing: INITIAL_VIEW.bearing,
      maxPitch: 85,
      interactive: false
    });

    fetch('glendale-buildings.geojson')
      .then(r => r.json())
      .then(data => {
        const layer = new deck.GeoJsonLayer({
          id: 'buildings',
          data: data,
          extruded: true,
          wireframe: false,
          opacity: 0.9,
          getElevation: f => (f.properties.height || 3) * 3,
          getFillColor: f => heightToColor(f.properties.height || 0),
          material: {
            ambient: 0.4,
            diffuse: 0.6,
            shininess: 20,
            specularColor: [60, 60, 60]
          },
          pickable: true,
          onHover: ({object, x, y}) => {
            if (object) {
              tooltip.style.display = 'block';
              tooltip.style.left = x + 10 + 'px';
              tooltip.style.top = y + 10 + 'px';
              tooltip.textContent = `Height: ${(object.properties.height || 0).toFixed(1)}m`;
            } else {
              tooltip.style.display = 'none';
            }
          }
        });

        const deckgl = new deck.DeckGL({
          parent: 'container',
          initialViewState: INITIAL_VIEW,
          controller: {dragRotate: true, touchRotate: true, maxPitch: 85},
          onViewStateChange: ({viewState}) => {
            map.jumpTo({
              center: [viewState.longitude, viewState.latitude],
              zoom: viewState.zoom,
              bearing: viewState.bearing,
              pitch: viewState.pitch
            });
          },
          layers: [layer]
        });
      });
  </script>
</body>
</html>
