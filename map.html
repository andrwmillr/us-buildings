<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Building Heights — 3D</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/deck.gl@latest/dist.min.js"></script>
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
    #container { width: 100vw; height: 100vh; position: relative; }

    #controls {
      position: absolute; top: 16px; left: 16px; z-index: 2;
      display: flex; gap: 8px; align-items: center;
    }
    #city-input {
      padding: 10px 14px; font-size: 15px; border: none; border-radius: 8px;
      background: rgba(0,0,0,0.8); color: white; width: 260px; outline: none;
    }
    #city-input::placeholder { color: #888; }
    #city-input:focus { box-shadow: 0 0 0 2px #a62098; }
    #status {
      color: #888; font-size: 13px; background: rgba(0,0,0,0.7);
      padding: 6px 10px; border-radius: 6px; display: none;
    }

    #legend {
      position: absolute; bottom: 30px; right: 20px; background: rgba(0,0,0,0.8);
      padding: 12px 16px; border-radius: 8px; color: white; font-size: 13px; z-index: 1;
    }
    #legend h3 { margin: 0 0 8px 0; font-size: 14px; }
    .legend-bar {
      width: 20px; height: 120px; border-radius: 3px;
      background: linear-gradient(to top, #1a0533, #4a0c6b, #a62098, #e85362, #fcae12, #fcffa4);
      display: inline-block; vertical-align: top;
    }
    .legend-labels {
      display: inline-block; vertical-align: top; margin-left: 8px;
      height: 120px; position: relative;
    }
    .legend-labels span { position: absolute; font-size: 11px; }

    #tooltip {
      position: absolute; padding: 6px 10px; background: rgba(0,0,0,0.85);
      color: white; font-size: 12px; border-radius: 4px; pointer-events: none;
      display: none; z-index: 2;
    }
  </style>
</head>
<body>
  <div id="container"></div>

  <div id="controls">
    <input id="city-input" type="text" placeholder="Search a city..." autofocus />
    <div id="status"></div>
  </div>

  <div id="legend">
    <h3>Height (m)</h3>
    <div class="legend-bar"></div>
    <div class="legend-labels">
      <span style="top: 0" id="legend-max">50+</span>
      <span style="top: 54px" id="legend-mid">25</span>
      <span style="top: 108px">0</span>
    </div>
  </div>

  <div id="tooltip"></div>

  <script>
    // --- City registry ---
    // To add a new city: export its GeoJSON, then add an entry here.
    const CITIES = {
      'boston': {
        file: 'boston-buildings.geojson',
        lng: -71.06, lat: 42.355, zoom: 14,
        maxHeight: 50
      },
      'glendale': {
        file: 'glendale-buildings.geojson',
        lng: -112.15, lat: 33.65, zoom: 12.5,
        maxHeight: 15
      }
    };

    // --- Color scale ---
    function heightToColor(h, maxHeight) {
      const stops = [
        [0, [26, 5, 51]],
        [0.2, [74, 12, 107]],
        [0.4, [166, 32, 152]],
        [0.6, [232, 83, 98]],
        [0.8, [252, 174, 18]],
        [1.0, [252, 255, 164]]
      ];
      const t = Math.min(h / maxHeight, 1);
      for (let i = 0; i < stops.length - 1; i++) {
        if (t >= stops[i][0] && t <= stops[i + 1][0]) {
          const f = (t - stops[i][0]) / (stops[i + 1][0] - stops[i][0]);
          return stops[i][1].map((c, j) => Math.round(c + f * (stops[i + 1][1][j] - c)));
        }
      }
      return stops[stops.length - 1][1];
    }

    // --- Map setup ---
    const tooltip = document.getElementById('tooltip');
    const status = document.getElementById('status');
    const input = document.getElementById('city-input');

    const INITIAL = { longitude: -71.06, latitude: 42.355, zoom: 14, pitch: 55, bearing: -20 };

    const map = new maplibregl.Map({
      container: 'container',
      style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
      center: [INITIAL.longitude, INITIAL.latitude],
      zoom: INITIAL.zoom,
      pitch: INITIAL.pitch,
      bearing: INITIAL.bearing,
      maxPitch: 85,
      interactive: false
    });

    const deckCanvas = document.createElement('canvas');
    deckCanvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:auto;';
    document.getElementById('container').appendChild(deckCanvas);

    const deckgl = new deck.DeckGL({
      canvas: deckCanvas,
      initialViewState: INITIAL,
      controller: { dragRotate: true, touchRotate: true, maxPitch: 85 },
      onViewStateChange: ({ viewState }) => {
        map.jumpTo({
          center: [viewState.longitude, viewState.latitude],
          zoom: viewState.zoom,
          bearing: viewState.bearing,
          pitch: viewState.pitch
        });
        return viewState;
      },
      layers: []
    });

    // --- Known tall buildings (heights from Wikipedia) ---
    // Each entry: [lng, lat, height_m, name]
    const TALL_BUILDINGS = {
      'boston': [
        [-71.075922, 42.349115, 241, '200 Clarendon (Hancock Tower)'],
        [-71.080774, 42.346899, 228, 'Prudential Tower'],
        [-71.078420, 42.348621, 228, 'One Dalton Street'],
        [-71.058237, 42.354835, 211, 'Winthrop Center'],
        [-71.060483, 42.356946, 209, 'Millennium Tower'],
        [-71.0486, 42.3553, 177, 'International Place'],
        [-71.0513, 42.3533, 170, 'One Lincoln Street'],
        [-71.0528, 42.3553, 153, 'One Post Office Square'],
        [-71.0575, 42.3541, 152, '100 Federal Street'],
        [-71.0566, 42.3527, 150, 'One Financial Center'],
        [-71.0831, 42.3479, 137, '111 Huntington Avenue'],
        [-71.0493, 42.3566, 122, 'State Street Financial Center'],
        [-71.0762, 42.3488, 120, 'Copley Place Tower'],
      ]
    };

    function patchHeights(data, cityName) {
      const patches = TALL_BUILDINGS[cityName];
      if (!patches) return data;
      for (const feature of data.features) {
        if (!feature.geometry || !feature.geometry.coordinates) continue;
        // Get centroid of polygon
        const coords = feature.geometry.coordinates[0];
        if (!coords || coords.length === 0) continue;
        let cx = 0, cy = 0;
        for (const [x, y] of coords) { cx += x; cy += y; }
        cx /= coords.length; cy /= coords.length;
        // Check against known buildings (within ~30m)
        for (const [lng, lat, height, name] of patches) {
          const dist = Math.sqrt((cx - lng) ** 2 + (cy - lat) ** 2);
          if (dist < 0.0005) {
            feature.properties.height = height;
            feature.properties.name = name;
            break;
          }
        }
      }
      return data;
    }

    // --- Load a city ---
    function loadCity(config) {
      status.style.display = 'block';
      status.textContent = 'Loading...';

      // Update legend
      document.getElementById('legend-max').textContent = config.maxHeight + '+';
      document.getElementById('legend-mid').textContent = Math.round(config.maxHeight / 2);

      fetch(config.file)
        .then(r => {
          if (!r.ok) throw new Error('City data not found');
          return r.json();
        })
        .then(data => {
          patchHeights(data, Object.keys(CITIES).find(k => CITIES[k] === config));
          const layer = new deck.GeoJsonLayer({
            id: 'buildings',
            data: data,
            extruded: true,
            wireframe: false,
            opacity: 0.9,
            getElevation: f => f.properties.height || 3,
            getFillColor: f => heightToColor(f.properties.height || 0, config.maxHeight),
            material: {
              ambient: 0.4,
              diffuse: 0.6,
              shininess: 20,
              specularColor: [60, 60, 60]
            },
            pickable: true,
            onHover: ({ object, x, y }) => {
              if (object) {
                tooltip.style.display = 'block';
                tooltip.style.left = x + 10 + 'px';
                tooltip.style.top = y + 10 + 'px';
                const name = object.properties.name;
                const h = (object.properties.height || 0).toFixed(1);
                const addr = object.properties._address;
                if (name) {
                  tooltip.textContent = addr ? `${name}\n${addr} — ${h}m` : `${name} — ${h}m`;
                } else {
                  tooltip.textContent = addr ? `${addr} — ${h}m` : `Height: ${h}m`;
                }

                // Reverse geocode once per building
                if (!object.properties._geocoded) {
                  object.properties._geocoded = true;
                  const ring = object.geometry.coordinates[0];
                  const flat = Array.isArray(ring[0][0]) ? ring[0] : ring;
                  const cx = flat.reduce((s, c) => s + c[0], 0) / flat.length;
                  const cy = flat.reduce((s, c) => s + c[1], 0) / flat.length;
                  fetch(`https://nominatim.openstreetmap.org/reverse?lat=${cy}&lon=${cx}&format=json&zoom=18`)
                    .then(r => r.json())
                    .then(d => {
                      if (d.address) {
                        const parts = [d.address.house_number, d.address.road].filter(Boolean);
                        object.properties._address = parts.join(' ') || d.display_name.split(',')[0];
                      }
                    })
                    .catch(() => {});
                }
              } else {
                tooltip.style.display = 'none';
              }
            }
          });

          deckgl.setProps({ layers: [layer] });

          const viewState = {
            longitude: config.lng,
            latitude: config.lat,
            zoom: config.zoom,
            pitch: 55,
            bearing: -20,
            transitionDuration: 1000
          };
          deckgl.setProps({ initialViewState: viewState });
          map.jumpTo({
            center: [config.lng, config.lat],
            zoom: config.zoom,
            pitch: 55,
            bearing: -20
          });

          status.textContent = `${data.features.length.toLocaleString()} buildings`;
          setTimeout(() => { status.style.display = 'none'; }, 3000);
        })
        .catch(err => {
          status.textContent = 'City not available yet — run export script to add it';
          setTimeout(() => { status.style.display = 'none'; }, 5000);
        });
    }

    // --- Search handling ---
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const query = input.value.trim().toLowerCase();
        const match = Object.keys(CITIES).find(k => query.includes(k));
        if (match) {
          loadCity(CITIES[match]);
          input.blur();
        } else {
          status.style.display = 'block';
          status.textContent = 'City not available — run export script to add it';
          setTimeout(() => { status.style.display = 'none'; }, 5000);
        }
      }
    });

    // Load from URL param or default to Boston
    const params = new URLSearchParams(window.location.search);
    const cityParam = params.get('city');
    if (cityParam && CITIES[cityParam]) {
      input.value = cityParam.charAt(0).toUpperCase() + cityParam.slice(1);
      loadCity(CITIES[cityParam]);
    } else {
      input.value = 'Boston';
      loadCity(CITIES['boston']);
    }
  </script>
</body>
</html>
